<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Habit Tracker</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="css/main.css">
	<link rel="stylesheet" href="css/normalize.css">
</head>
<body>
<div class="app">
	<div class="panel">
		<img class="logo" src="images/logo.svg" alt="Логотип Deadmanch App">
		<nav class="menu">
			<div class="menu__list">
			</div>
			<button class="menu__add" onclick="tooglePopup()">
				<img src="images/add.svg" alt="Иконка добавления новых привычек">
			</button>
		</nav>
	</div>
		<div class="content">
		<header class="header">
		<h1 class="title">-</h1>
			<div class="progress">
				<div class="progress__text">
					<div class="progress__name">Прогресс</div>
					<div class="progress__percent">%</div>
				</div>
				<div class="progress__bar">
					<div class="progress__cover-bar"></div>
				</div>
			</div>
		</header>
			<main class="main">
				<div id="days"></div>
				<div class="habbit">
					<div class="habbit__day">День _</div>
					<form class="habbit__form" onsubmit="addDays(event)">
					<input
						name="comment"
						class="input_icon"
						type="text"
						placeholder="Комментарий"
					/>
						<img class="input__icon" src="./images/comment.svg" alt="Иконка комментария">
					<button class="button" type="submit">Готово</button>
					</form>
				</div>
			</main>
		</div>
	</div>
<div class="cover cover_hidden" id="add-habbit-id">
	<div class="popup">
		 <h2 class="popup__title">Новая привычка</h2>
		<div class="icon-label">Иконка</div>
		<div class="icon-select">
			<button class="icon icon_active" onclick="setIcon(this, 'dumbbell')">
				<img src="./images/dumbbell.svg" alt="Sport">
			</button>
			<button class="icon" onclick="setIcon(this, 'eat')">
				<img src="./images/eat.svg" alt="Eat">
			</button>
			<button class="icon" onclick="setIcon(this, 'water')">
				<img src="./images/water.svg" alt="Water">
			</button>
			
		</div>
		<form class="popup__form">
			<input
				type="text"
				name="name"
				placeholder="Введите название"
			/>
			<input
				type="text"
				name="icon"
				hidden
				value="dumbbell"
			/>
			<input
				type="number"
				name="target"
				placeholder="Введите цель"
			/>
			<button class="button" type="submit">Добавить</button>
		</form>
		<button class="popup__close">
			<img src="./images/close.svg" alt="Закрыть" onclick="tooglePopup()">
		</button>
	</div>
</div>
<script src="scripts/app.js"></script>
</body>
</html>
