<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Habit Tracker</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="css/main.css">
	<link rel="stylesheet" href="css/normalize.css">
</head>
<body>
<div class="app">
	<div class="panel">
		<img class="logo" src="images/logo.svg" alt="Логотип Deadmanch App">
		<nav class="menu">
			<div class="menu__list">
				<button class="menu__item ">
					<img src="images/dumbbell.svg" alt="Иконка гантель">
				</button>
				<button class="menu__item menu__item-active">
					<img src="images/water.svg" alt="Иконка воды">
				</button>
				<button class="menu__item">
					<img src="images/eat.svg" alt="Иконка еды">
				</button>
			</div>
			<button class="menu__add">
				<img src="images/add.svg" alt="Иконка добавления новых привычек">
			</button>
		</nav>
	</div>
		<div class="content">
		<header class="header">
		<h1 class="title">Отжимания</h1>
			<div class="progress">
				<div class="progress__text">
					<div class="progress__name">Прогресс</div>
					<div class="progress__percent">80%</div>
				</div>
				<div class="progress__bar">
					<div class="progress__cover-bar"></div>
				</div>
			</div>
		</header>
			<main class="main">
			
			</main>
		</div>
	</div>
<script src="scripts/app.js"></script>
</body>
</html>
