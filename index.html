<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Habit Tracker</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="css/main.css">
	<link rel="stylesheet" href="css/normalize.css">
</head>
<body>
<div class="app">
	<div class="panel">
		<img class="logo" src="images/logo.svg" alt="Логотип Deadmanch App">
		<nav class="menu">
			<div class="menu__list">
			</div>
			<button class="menu__add">
				<img src="images/add.svg" alt="Иконка добавления новых привычек">
			</button>
		</nav>
	</div>
		<div class="content">
		<header class="header">
		<h1 class="title">-</h1>
			<div class="progress">
				<div class="progress__text">
					<div class="progress__name">Прогресс</div>
					<div class="progress__percent">%</div>
				</div>
				<div class="progress__bar">
					<div class="progress__cover-bar"></div>
				</div>
			</div>
		</header>
			<main class="main">
				<div>
					<div class="habbit">
						<div class="habbit__day">День 1</div>
							<div class="habbit__comment">Первый подход всегда даётся тяжело</div>
								<button class="habbit__delete">
									<img src="./images/delete.svg" alt="Иконка удаления привычки">
								</button>
							</div>
				</div>
				<div class="habbit">
					<div class="habbit__day">День 2</div>
					<form class="habbit__form">
					<input class="input_icon" type="text" placeholder="Комментарий" />
						<img class="input__icon" src="./images/comment.svg" alt="Иконка комментария">
					<button class="button">Готово</button>
					</form>
				</div>
			</main>
		</div>
	</div>
<script src="scripts/app.js"></script>
</body>
</html>
